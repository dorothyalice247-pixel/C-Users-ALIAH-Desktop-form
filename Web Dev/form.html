<!DOCTYPE html>
<html>
<head><title> university form</title> </head>
<body>

    <form action="index.php" method="POST">
        <label for="username">username:</label>
        <input type="text" id="username" placeholder= "Spongebob"minlength="6" maxlength="15">

     <br>
      <label for="password">password:</label>
      <input type="password" id="password" minlength="6" maxlength="15"required><br>

      <label for="email">email:</label>
      <input type="email"id="email"placeholder="ssquare@gail.com" ><br>

      <label for="bday">birthday:</label>
      <input type="date" id="bday"><br>

       <label for="quantity">quantity:</label>
      <input type="number" id="quantity"><br>

      <label for="title">title:</label>

      <label for="Mr.">Mr.:</label>
      <input type="radio" id="Mr." value="Mr."name="title">
      <label for="Ms.">Ms.:</label>
      <input type="radio" id="Ms."value="Ms."name="title">
      <label for="PhD.">PhD.:</label>
      <input type="radio" id="PhD."value="PhD."name="title"><br>
      
      <label for ="payment">Payment</label>
      <select id="payment">
        <option value="visa">visa</option>
        <option value="mastercard">mastercard</option>
        <option value="giftcard">giftcard</option>
      </select><br>

      <label for="subscribe">subscribe:</label>
      <input type="checkbox" id="subscribe"><br>
     <label for="comment">comment:</label>
     <textarea id="comment" rows="3" cols="25"></textarea><br>
     <label for="file">file:</label>
     <input type="file" id="file" accept="image/png,doc"><br>
      <label for="phone">phone number:</label>
      <input type="tel" id="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>
    <input type="reset"><br>
    <input type="submit">

    </form>

</body>
</html>
